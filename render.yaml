# Blueprint Render — deploy do backend
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: cadastro-cpf-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/citizens.sqlite
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
