name: Frontend (Vitest)

run-name: Frontend (Vitest) — testes do Vue

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci --prefix frontend

      - name: Rodar testes
        run: npm test --prefix frontend
        env:
          CI: true

      - name: Publicar resultados dos testes
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Frontend (Vitest)
          path: frontend/test-results/vitest-junit.xml
          reporter: java-junit
          fail-on-error: false
