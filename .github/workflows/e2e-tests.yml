name: E2E (Playwright)

run-name: E2E (Playwright) — fluxo completo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  test:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: |
          npm ci
          npm ci --prefix backend
          npm ci --prefix frontend

      - name: Instalar Playwright
        run: npx playwright install --with-deps chromium

      - name: Build do frontend
        run: VITE_API_URL=http://127.0.0.1:3001 npm run build --prefix frontend
        env:
          CI: true

      - name: Rodar testes E2E
        run: npm run test:e2e
        env:
          CI: true

      - name: Publicar resultados dos testes
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E (Playwright)
          path: e2e/test-results/playwright-junit.xml
          reporter: java-junit
          fail-on-error: false
