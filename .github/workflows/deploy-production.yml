name: Deploy to Production

run-name: Deploy to Production — Vercel

on:
  workflow_run:
    workflows:
      - Backend (Jest)
      - Frontend (Vitest)
      - E2E (Playwright)
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  actions: read

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    environment:
      name: production
      url: https://citizen-registry-system.vercel.app
    steps:
      - name: Verificar se todos os testes passaram
        if: github.event_name == 'workflow_run'
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            const required = ['Backend (Jest)', 'Frontend (Vitest)', 'E2E (Playwright)'];

            const { data } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: sha,
              branch: 'main',
              per_page: 100
            });

            for (const name of required) {
              const run = data.workflow_runs.find(r => r.name === name);
              if (!run || run.status !== 'completed') {
                core.info(`"${name}" ainda não concluiu para ${sha}; aguardando demais workflows.`);
                return;
              }
              if (run.conclusion !== 'success') {
                core.setFailed(`"${name}" não passou para ${sha} (conclusão: ${run.conclusion}).`);
                return;
              }
            }

            core.info(`Todos os testes passaram para ${sha}; prosseguindo com deploy.`);

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Registrar deployment de produção
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run?.head_sha || context.sha;
            const productionUrl = 'https://citizen-registry-system.vercel.app';
            const logUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const testSummary = 'Testes passaram: Backend (Jest), Frontend (Vitest), E2E (Playwright)';

            const existing = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              environment: 'production',
              per_page: 1
            });

            if (existing.data.length > 0) {
              console.log(`Deployment de produção já existe para ${sha}; ignorando duplicata.`);
              return;
            }

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              environment: 'production',
              production_environment: true,
              auto_merge: false,
              required_contexts: [],
              description: `${testSummary} — ver Actions run`
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment: 'production',
              environment_url: productionUrl,
              log_url: logUrl,
              description: `${testSummary}. Live no Vercel.`,
              auto_inactive: true
            });
