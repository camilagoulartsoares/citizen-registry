name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  backend:
    name: Backend (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        run: npm ci --prefix backend

      - name: Rodar testes
        run: npm test --prefix backend

  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci --prefix frontend

      - name: Rodar testes
        run: npm test --prefix frontend

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: |
          npm ci
          npm ci --prefix backend
          npm ci --prefix frontend

      - name: Instalar Playwright
        run: npx playwright install --with-deps chromium

      - name: Build do frontend
        run: VITE_API_URL=http://127.0.0.1:3001 npm run build --prefix frontend
        env:
          CI: true

      - name: Rodar testes E2E
        run: npm run test:e2e
        env:
          CI: true

  # Registra release em produção somente em push para main (após todos os testes).
  # workflow_dispatch roda apenas backend, frontend e e2e — sem criar deployment.
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend, frontend, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://citizen-registry-system.vercel.app
    steps:
      - uses: actions/checkout@v4

      - name: Registrar deployment de produção
        uses: actions/github-script@v7
        with:
          script: |
            const productionUrl = 'https://citizen-registry-system.vercel.app';
            const logUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const testSummary = 'Testes passaram: Backend (Jest), Frontend (Vitest), E2E (Playwright)';

            const existing = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              environment: 'production',
              per_page: 1
            });

            if (existing.data.length > 0) {
              console.log(`Deployment de produção já existe para ${context.sha}; ignorando duplicata.`);
              return;
            }

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              production_environment: true,
              auto_merge: false,
              required_contexts: [],
              description: `${testSummary} — ver Actions run`
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment: 'production',
              environment_url: productionUrl,
              log_url: logUrl,
              description: `${testSummary}. Live no Vercel.`,
              auto_inactive: true
            });
