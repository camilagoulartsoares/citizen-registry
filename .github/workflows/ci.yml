name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  backend:
    name: Backend (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        run: npm ci --prefix backend

      - name: Rodar testes
        run: npm test --prefix backend

  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci --prefix frontend

      - name: Rodar testes
        run: npm test --prefix frontend

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: |
          npm ci
          npm ci --prefix backend
          npm ci --prefix frontend

      - name: Instalar Playwright
        run: npx playwright install --with-deps chromium

      - name: Build do frontend
        run: VITE_API_URL=http://127.0.0.1:3001 npm run build --prefix frontend
        env:
          CI: true

      - name: Rodar testes E2E
        run: npm run test:e2e
        env:
          CI: true

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [e2e]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment:
      name: production
      url: https://citizen-registry-system.vercel.app
    steps:
      - uses: actions/checkout@v4

      - name: Registrar deployment de produção
        uses: actions/github-script@v7
        with:
          script: |
            const productionUrl = 'https://citizen-registry-system.vercel.app';
            const logUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let deploymentId;

            const existing = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              environment: 'production',
              per_page: 1
            });

            if (existing.data.length > 0) {
              deploymentId = existing.data[0].id;
            } else {
              const deployment = await github.rest.repos.createDeployment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.sha,
                environment: 'production',
                production_environment: true,
                auto_merge: false,
                required_contexts: [],
                description: 'Produção no Vercel (citizen-registry-system.vercel.app)'
              });
              deploymentId = deployment.data.id;
            }

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state: 'success',
              environment: 'production',
              environment_url: productionUrl,
              log_url: logUrl,
              description: 'Live no Vercel — CI passou',
              auto_inactive: true
            });
